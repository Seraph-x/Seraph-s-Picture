  <script>
  /* Early background paint: insert a fixed z-index:0 layer with the cached
     custom background as soon as <body> exists, so navigating between pages
     doesn't flash. Mirrors theme.js's .ui-bg-image-layer (content is z-index:5
     above it); theme.js adds its own identical layer on load. */
  (function () {
    try {
      var dark = false;
      try { dark = localStorage.getItem("themeMode") === "dark"; } catch (e) {}
      var s = {};
      try { s = JSON.parse(localStorage.getItem("kvUiDesignSettings")) || {}; } catch (e) {}
      var base = dark ? "#1c1b19" : (s.baseColor || "#fafaf8");
      var url = s.globalBackgroundUrl || "";
      if (/login/.test(location.pathname) && s.loginBackgroundMode === "custom") {
        url = s.loginBackgroundUrl || url;
      }
      if (!url || !/^(https?:)?\/\/|^\//.test(url)) return;
      var safe = url.replace(/["\\]/g, function (c) { return "\\" + c; });
      function inject() {
        if (!document.body) return false;
        if (document.getElementById("kv-early-bg-layer")) return true;
        var d = document.createElement("div");
        d.id = "kv-early-bg-layer";
        d.style.cssText =
          "position:fixed;inset:0;z-index:0;pointer-events:none;background-color:" + base +
          ';background-image:url("' + safe + '");background-size:cover;' +
          "background-position:center;background-repeat:no-repeat;";
        document.body.insertBefore(d, document.body.firstChild);
        return true;
      }
      if (!inject()) {
        var obs = new MutationObserver(function () { if (inject()) obs.disconnect(); });
        obs.observe(document.documentElement, { childList: true });
        document.addEventListener("DOMContentLoaded", function () { inject(); obs.disconnect(); }, { once: true });
      }
    } catch (e) {}
  })();
  </script>
  <script src="/theme.js?v=20260305"></script>
  <script src="/i18n.js?v=20260611"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
  <style>
    :root {
      --primary-color: var(--claude-accent);
      --primary-light: var(--claude-accent-strong);
      --accent-color: var(--claude-accent-strong);
      --bg-gradient: linear-gradient(135deg, var(--claude-accent-strong) 0%, var(--claude-panel-soft) 100%);
      --card-bg: rgba(255, 255, 255, 0.9);
      --shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg-gradient);
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      position: relative;
    }

    /* 自定义背景图 */
    body.has-bg-image {
      background: none;
    }

    .bg-image-layer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      z-index: -1;
    }

    .bg-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.3);
      z-index: -1;
    }

    .login-container {
      width: 100%;
      max-width: 420px;
      animation: fadeInUp 0.5s ease-out;
    }

    .login-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 28px;
      padding: 48px 40px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.1), 0 2px 16px rgba(217, 119, 87, 0.08);
      text-align: center;
      border: 1px solid rgba(255, 255, 255, 0.5);
    }

    .logo {
      font-size: 3.5em;
      color: var(--primary-color);
      margin-bottom: 20px;
    }

    .title {
      font-size: 1.9em;
      font-weight: 700;
      color: #333;
      margin-bottom: 10px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      color: #666;
      margin-bottom: 36px;
      font-size: 0.95em;
      line-height: 1.5;
    }

    .form-group {
      margin-bottom: 20px;
      text-align: left;
    }

    .form-group label {
      display: block;
      font-size: 0.9em;
      color: #666;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .input-wrapper {
      position: relative;
    }

    .input-wrapper i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #999;
      font-size: 1em;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px 14px 44px;
      border: 2px solid #eee;
      border-radius: 12px;
      font-size: 1em;
      transition: all 0.3s;
      background: white;
    }

    .form-input.has-toggle {
      padding-right: 56px;
    }

    .form-input:focus {
      border-color: var(--primary-color);
      outline: none;
      box-shadow: 0 0 0 3px rgba(217, 119, 87, 0.1);
    }

    .form-input::placeholder {
      color: #bbb;
    }

    .password-toggle {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      width: 34px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: none;
      border: none;
      border-radius: 8px;
      color: #999;
      cursor: pointer;
      padding: 0;
      z-index: 2;
    }

    .password-toggle:hover {
      color: var(--primary-color);
    }

    .remember-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
    }

    .remember-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      font-size: 0.9em;
      color: #666;
    }

    .remember-label input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary-color);
    }

    .login-btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, var(--primary-color) 0%, var(--claude-accent-strong) 100%);
      border: none;
      border-radius: 14px;
      color: white;
      font-size: 1.1em;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      position: relative;
      overflow: hidden;
    }

    .login-btn::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 100%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
      transition: 0.5s;
    }

    .login-btn:hover::before {
      left: 100%;
    }

    .login-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 10px 25px rgba(217, 119, 87, 0.4);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .login-btn:disabled {
      opacity: 0.7;
      cursor: not-allowed;
      transform: none;
    }

    .login-btn .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .login-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--text-secondary, #98a2b3);
      font-size: 0.85em;
    }
    .login-divider::before,
    .login-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(150, 150, 150, 0.25);
    }
    .login-btn-secondary {
      background: transparent;
      color: var(--primary-color, #d97757);
      border: 1px solid rgba(217, 119, 87, 0.5);
      font-size: 1em;
    }
    .login-btn-secondary:hover {
      background: rgba(217, 119, 87, 0.08);
      box-shadow: none;
      transform: translateY(-2px);
    }
    .login-btn-secondary .spinner {
      border: 2px solid rgba(217, 119, 87, 0.3);
      border-top-color: var(--primary-color, #d97757);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .error-message {
      background: #fff0f0;
      border: 1px solid #ffcccc;
      color: #d32f2f;
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 0.9em;
      display: none;
    }

    .error-message.show {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* 动画 */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* 响应式 */
    @media (max-width: 768px) {
      body {
        padding: 20px;
      }

      .login-card {
        max-width: 100%;
        padding: 40px 28px;
      }

      .logo {
        font-size: 3em;
      }

      .title {
        font-size: 1.8em;
      }

      .subtitle {
        font-size: 0.95em;
      }

      .form-input {
        padding: 14px 18px;
        font-size: 1em;
      }

      .form-input.has-toggle {
        padding-right: 52px;
      }

      .password-toggle {
        right: 9px;
        width: 32px;
        height: 32px;
      }

      .submit-btn {
        padding: 14px;
        font-size: 1em;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        align-items: flex-start;
        padding-top: 10vh;
      }

      .login-card {
        padding: 30px 20px;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.15);
      }

      .logo {
        font-size: 2.5em;
        margin-bottom: 8px;
      }

      .title {
        font-size: 1.4em;
        margin-bottom: 6px;
      }

      .subtitle {
        font-size: 0.85em;
      }

      .login-form {
        gap: 16px;
        margin-top: 24px;
      }

      .form-group {
        margin-bottom: 0;
      }

      .form-group label {
        font-size: 0.85em;
        margin-bottom: 6px;
      }

      .form-input {
        padding: 12px 14px;
        font-size: 0.95em;
        border-radius: 10px;
      }

      .form-input.has-toggle {
        padding-right: 48px;
      }

      .password-toggle {
        right: 8px;
        width: 30px;
        height: 30px;
        font-size: 0.9em;
      }

      .submit-btn {
        padding: 12px;
        font-size: 0.95em;
        border-radius: 10px;
        margin-top: 4px;
      }

      .links {
        margin-top: 20px;
        flex-direction: column;
        gap: 10px;
      }

      .links a {
        font-size: 0.85em;
      }

      /* Element UI 消息优化 */
      .el-message {
        min-width: auto !important;
        max-width: 90% !important;
        padding: 10px 14px !important;
      }

      .el-message__content {
        font-size: 13px !important;
      }
    }

    @media (max-width: 360px) {
      body {
        padding: 10px;
        padding-top: 8vh;
      }

      .login-card {
        padding: 24px 16px;
        border-radius: 16px;
      }

      .logo {
        font-size: 2.2em;
      }

      .title {
        font-size: 1.25em;
      }

      .form-input {
        padding: 10px 12px;
        font-size: 0.9em;
      }

      .submit-btn {
        padding: 10px;
        font-size: 0.9em;
      }
    }

    /* 深色模式支持 */
  </style>

<body class="login-page">
  <!-- 背景图层 (通过JS动态控制) -->
  <div class="bg-image-layer" id="bgImageLayer" style="display: none;"></div>
  <div class="bg-overlay" id="bgOverlay" style="display: none;"></div>

  <!-- 语言切换 -->
  <button type="button" class="theme-floating-toggle" data-i18n-toggle aria-label="切换语言">
    <span data-lang-label>EN</span>
  </button>

  <div class="login-container">
    <div class="login-card">
      <div class="logo">
        <i class="fas fa-cloud-upload-alt"></i>
      </div>
      <h1 class="title">Seraph's Pictures</h1>
      <p class="subtitle" data-i18n="login.subtitle">请登录以继续使用文件托管服务</p>

      <div class="error-message" id="errorMessage">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText" data-i18n="login.errInvalid">用户名或密码错误</span>
      </div>

      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label for="username" data-i18n="login.username">用户名</label>
          <div class="input-wrapper">
            <i class="fas fa-user"></i>
            <input type="text" id="username" class="form-input" data-i18n-placeholder="login.usernamePh" placeholder="请输入用户名" required autofocus>
          </div>
        </div>

        <div class="form-group">
          <label for="password" data-i18n="login.password">密码</label>
          <div class="input-wrapper">
            <i class="fas fa-lock"></i>
            <input type="password" id="password" class="form-input has-toggle" data-i18n-placeholder="login.passwordPh" placeholder="请输入密码" required>
            <button type="button" class="password-toggle" onclick="togglePassword()">
              <i class="fas fa-eye" id="passwordToggleIcon"></i>
            </button>
          </div>
        </div>

        <div class="remember-row">
          <label class="remember-label">
            <input type="checkbox" id="remember" checked>
            <span data-i18n="login.remember">记住登录状态</span>
          </label>
        </div>

        <button type="submit" class="login-btn" id="loginBtn">
          <i class="fas fa-sign-in-alt"></i>
          <span data-i18n="login.submit">登 录</span>
        </button>
      </form>

      <div class="login-divider"><span data-i18n="login.or">或</span></div>
      <button type="button" class="login-btn login-btn-secondary" id="passkeyBtn" onclick="handlePasskeyLogin()">
        <i class="fas fa-fingerprint"></i>
        <span data-i18n="login.passkey">使用 Passkey 登录</span>
      </button>

    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@simplewebauthn/browser@13.3.0/dist/bundle/index.umd.min.js"></script>
  <script>
    // 双语词典
    I18n.register({
      zh: {
        'login.docTitle': '登录 | Seraph\'s Pictures',
        'login.subtitle': '请登录以继续使用文件托管服务',
        'login.username': '用户名',
        'login.usernamePh': '请输入用户名',
        'login.password': '密码',
        'login.passwordPh': '请输入密码',
        'login.remember': '记住登录状态',
        'login.submit': '登 录',
        'login.submitting': '登录中...',
        'login.errInvalid': '用户名或密码错误',
        'login.errEmpty': '请输入用户名和密码',
        'login.errFailed': '登录失败',
        'login.errNetwork': '网络错误，请稍后重试',
        'login.or': '或',
        'login.passkey': '使用 Passkey 登录',
        'login.passkeyAuthing': '正在验证 Passkey...',
        'login.passkeyNone': '尚未注册任何 Passkey',
        'login.passkeyUnsupported': '当前浏览器不支持 Passkey',
        'login.passkeyCancelled': '已取消或验证失败',
        'login.passkeyFailed': 'Passkey 登录失败'
      },
      en: {
        'login.docTitle': 'Sign In | Seraph\'s Pictures',
        'login.subtitle': 'Sign in to continue to your media workspace',
        'login.username': 'Username',
        'login.usernamePh': 'Enter your username',
        'login.password': 'Password',
        'login.passwordPh': 'Enter your password',
        'login.remember': 'Keep me signed in',
        'login.submit': 'Sign In',
        'login.submitting': 'Signing in...',
        'login.errInvalid': 'Incorrect username or password',
        'login.errEmpty': 'Please enter your username and password',
        'login.errFailed': 'Sign-in failed',
        'login.errNetwork': 'Network error, please try again later',
        'login.or': 'or',
        'login.passkey': 'Sign in with Passkey',
        'login.passkeyAuthing': 'Verifying passkey...',
        'login.passkeyNone': 'No passkey registered yet',
        'login.passkeyUnsupported': 'This browser does not support passkeys',
        'login.passkeyCancelled': 'Cancelled or verification failed',
        'login.passkeyFailed': 'Passkey sign-in failed'
      }
    });

    // 加载自定义背景
    (function() {
      if (
        window.UIDesignManager &&
        typeof window.UIDesignManager.syncFromServer === 'function'
      ) {
        window.UIDesignManager.syncFromServer({
          silent: true,
          applyLocalOnFailure: true
        });
        return;
      }
      const bgMode = localStorage.getItem('loginBackgroundMode') || 'gradient';
      const bgUrl = localStorage.getItem('loginBackgroundUrl') || '';
      const bgLayer = document.getElementById('bgImageLayer');
      const overlay = document.getElementById('bgOverlay');

      if (bgMode === 'image' && bgUrl) {
        bgLayer.style.backgroundImage = `url(${bgUrl})`;
        bgLayer.style.display = 'block';
        overlay.style.display = 'block';
        document.body.classList.add('has-bg-image');
      } else if (bgMode === 'bing') {
        // 使用 Bing 每日壁纸 API
        fetch('/api/bing/wallpaper/')
          .then(res => res.json())
          .then(data => {
            if (data.status && data.data && data.data.length > 0) {
              const bingUrl = 'https://cn.bing.com' + data.data[0].url;
              bgLayer.style.backgroundImage = `url(${bingUrl})`;
              bgLayer.style.display = 'block';
              overlay.style.display = 'block';
              document.body.classList.add('has-bg-image');
            }
          })
          .catch(err => console.log('Bing wallpaper fetch failed:', err));
      }
    })();

    // 页面加载时检查认证状态
    (async function() {
      try {
        const response = await fetch('/api/auth/check');
        const data = await response.json();
        
        if (!data.authRequired) {
          // 不需要认证，直接跳转
          redirectToTarget();
          return;
        }
        
        if (data.authenticated) {
          // 已认证，跳转到目标页面
          redirectToTarget();
        }
      } catch (e) {
        console.error('Auth check failed:', e);
      }
    })();

    function redirectToTarget() {
      const params = new URLSearchParams(window.location.search);
      const target = sanitizeRedirectTarget(params.get('redirect'));
      
      // 使用 replace 防止用户回退到登录页
      window.location.replace(target);
    }

    function sanitizeRedirectTarget(value) {
      const target = String(value || '/').trim();
      if (!target.startsWith('/') || target.startsWith('//')) return '/';
      if (/[\u0000-\u001F\u007F]/.test(target)) return '/';

      const path = target.split(/[?#]/)[0].replace(/\/+$/, '') || '/';
      if (path === '/login' || path === '/login.html' || path.endsWith('/login.html')) {
        return '/';
      }

      return target;
    }

    function togglePassword() {
      const passwordInput = document.getElementById('password');
      const icon = document.getElementById('passwordToggleIcon');
      
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    }

    function showError(message) {
      const errorDiv = document.getElementById('errorMessage');
      const errorText = document.getElementById('errorText');
      errorText.textContent = message;
      errorDiv.classList.add('show');
    }

    function hideError() {
      document.getElementById('errorMessage').classList.remove('show');
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      if (loading) {
        btn.disabled = true;
        btn.innerHTML = '<div class="spinner"></div><span>' + I18n.t('login.submitting') + '</span>';
      } else {
        btn.disabled = false;
        btn.innerHTML = '<i class="fas fa-sign-in-alt"></i><span>' + I18n.t('login.submit') + '</span>';
      }
    }

    async function handleLogin(event) {
      event.preventDefault();
      hideError();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      
      if (!username || !password) {
        showError(I18n.t('login.errEmpty'));
        return;
      }
      
      setLoading(true);
      
      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (data.success) {
          // 登录成功，跳转
          redirectToTarget();
        } else {
          showError(data.message || I18n.t('login.errFailed'));
          setLoading(false);
        }
      } catch (error) {
        console.error('Login error:', error);
        showError(I18n.t('login.errNetwork'));
        setLoading(false);
      }
    }

    // 回车键提交
    document.getElementById('password').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') {
        document.getElementById('loginForm').dispatchEvent(new Event('submit'));
      }
    });

    function setPasskeyLoading(loading) {
      const btn = document.getElementById('passkeyBtn');
      if (!btn) return;
      btn.disabled = loading;
      btn.innerHTML = loading
        ? '<div class="spinner"></div><span>' + I18n.t('login.passkeyAuthing') + '</span>'
        : '<i class="fas fa-fingerprint"></i><span>' + I18n.t('login.passkey') + '</span>';
    }

    async function handlePasskeyLogin() {
      hideError();
      const SWA = window.SimpleWebAuthnBrowser;
      if (!SWA || !window.PublicKeyCredential) {
        showError(I18n.t('login.passkeyUnsupported'));
        return;
      }
      setPasskeyLoading(true);
      try {
        const optRes = await fetch('/api/auth/passkey/auth/options', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: '{}'
        });
        const optData = await optRes.json();
        if (!optRes.ok || !optData.success) {
          showError(optRes.status === 404 ? I18n.t('login.passkeyNone') : (optData.message || I18n.t('login.passkeyFailed')));
          setPasskeyLoading(false);
          return;
        }

        let assertion;
        try {
          assertion = await SWA.startAuthentication({ optionsJSON: optData.options });
        } catch (e) {
          showError(I18n.t('login.passkeyCancelled'));
          setPasskeyLoading(false);
          return;
        }

        const verifyRes = await fetch('/api/auth/passkey/auth/verify', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ response: assertion })
        });
        const verifyData = await verifyRes.json();
        if (verifyRes.ok && verifyData.success) {
          redirectToTarget();
        } else {
          showError(verifyData.message || I18n.t('login.passkeyCancelled'));
          setPasskeyLoading(false);
        }
      } catch (error) {
        console.error('Passkey login error:', error);
        showError(I18n.t('login.passkeyFailed'));
        setPasskeyLoading(false);
      }
    }
  </script>
</body>
</html>
