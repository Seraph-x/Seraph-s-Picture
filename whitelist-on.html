<!DOCTYPE html>

  <link rel="shortcut icon" href="/favicon.ico?v=20260615">
  <link rel="stylesheet" href="/theme.css?v=20260616">
  <script>
  /* Early background paint: insert a fixed z-index:0 layer with the cached
     custom background as soon as <body> exists, so navigating between pages
     doesn't flash. Mirrors theme.js's .ui-bg-image-layer (content is z-index:5
     above it); theme.js adds its own identical layer on load. */
  (function () {
    try {
      var dark = false;
      try { dark = localStorage.getItem("themeMode") === "dark"; } catch (e) {}
      var s = {};
      try { s = JSON.parse(localStorage.getItem("kvUiDesignSettings")) || {}; } catch (e) {}
      var base = dark ? "#1c1b19" : (s.baseColor || "#fafaf8");
      var url = s.globalBackgroundUrl || "";
      if (/login/.test(location.pathname) && s.loginBackgroundMode === "custom") {
        url = s.loginBackgroundUrl || url;
      }
      if (!url || !/^(https?:)?\/\/|^\//.test(url)) return;
      var safe = url.replace(/["\\]/g, function (c) { return "\\" + c; });
      function inject() {
        if (!document.body) return false;
        if (document.getElementById("kv-early-bg-layer")) return true;
        var d = document.createElement("div");
        d.id = "kv-early-bg-layer";
        d.style.cssText =
          "position:fixed;inset:0;z-index:0;pointer-events:none;background-color:" + base +
          ';background-image:url("' + safe + '");background-size:cover;' +
          "background-position:center;background-repeat:no-repeat;";
        document.body.insertBefore(d, document.body.firstChild);
        return true;
      }
      if (!inject()) {
        var obs = new MutationObserver(function () { if (inject()) obs.disconnect(); });
        obs.observe(document.documentElement, { childList: true });
        document.addEventListener("DOMContentLoaded", function () { inject(); obs.disconnect(); }, { once: true });
      }
    } catch (e) {}
  })();
  </script>
  <script src="/theme.js?v=20260305"></script>
  <script src="/i18n.js?v=20260611"></script>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=Edge">
<meta name="robots" content="noindex, nofollow">
<meta name="viewport" content="width=device-width,initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free/css/all.min.css">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  
  body {
    min-height: 100vh;
    color: var(--text-secondary);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Noto Sans SC', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .container {
    background: var(--card-bg);
    backdrop-filter: var(--ui-card-backdrop-filter, blur(20px));
    -webkit-backdrop-filter: var(--ui-card-backdrop-filter, blur(20px));
    border-radius: 24px;
    padding: 48px 40px;
    max-width: 500px;
    text-align: center;
    box-shadow: var(--shadow);
    border: 1px solid var(--surface-border);
    animation: fadeIn 0.5s ease-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .icon {
    width: 80px;
    height: 80px;
    background: linear-gradient(135deg, #e6a23c, #f0b86e);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 24px;
    font-size: 2.5em;
    color: white;
    box-shadow: 0 8px 24px rgba(230, 162, 60, 0.3);
  }

  .title {
    font-size: 1.5em;
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 16px;
  }

  .message {
    color: var(--text-secondary);
    line-height: 1.8;
    margin-bottom: 32px;
    font-size: 0.95em;
  }

  .footer {
    color: var(--text-muted);
    font-size: 0.85em;
  }

  .footer a {
    color: var(--claude-accent);
    text-decoration: none;
    font-weight: 500;
    transition: all 0.3s;
  }

  .footer a:hover {
    text-decoration: underline;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 24px;
    background: var(--claude-accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-size: 0.95em;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.3s;
    text-decoration: none;
    margin-bottom: 24px;
  }

  .back-btn:hover {
    transform: translateY(-2px);
    box-shadow: var(--shadow-hover);
  }
</style>
<link rel="stylesheet" href="/mobile-refactor.css">
  <link rel="stylesheet" href="/claude-theme.css">
  <link rel="stylesheet" href="/claude-layout.css">
</head>
<body>
  <button type="button" class="theme-floating-toggle" data-i18n-toggle aria-label="切换语言">
    <span data-lang-label>EN</span>
  </button>
  <div class="container">
    <div class="icon">
      <i class="fas fa-shield-alt"></i>
    </div>
    <h1 class="title" data-i18n="wl.title">白名单模式已开启</h1>
    <p class="message" data-i18n="wl.message">
      当前已开启白名单模式，上传的文件需要审核通过后才能展示。请等待管理员审核通过后再访问。
    </p>
    <a href="javascript:history.back()" class="back-btn">
      <i class="fas fa-arrow-left"></i>
      <span data-i18n="common.back">返回上一页</span>
    </a>
    <p class="footer">
      Seraph's Pictures
    </p>
  </div>
  <script>
    I18n.register({
      zh: {
        'wl.title': '白名单模式已开启',
        'wl.message': '当前已开启白名单模式，上传的文件需要审核通过后才能展示。请等待管理员审核通过后再访问。',
        'common.back': '返回上一页'
      },
      en: {
        'wl.title': 'Whitelist Mode Enabled',
        'wl.message': 'Whitelist mode is enabled. Uploaded files need approval before they can be displayed. Please wait for an administrator to approve it.',
        'common.back': 'Back'
      }
    });
  </script>
</body>
</html>
