<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Seraph's Pictures</title>
    <style>
      body { margin: 0; min-height: 100vh; display: grid; place-items: center; font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #1f1f1d; color: #f4efe7; }
      main { width: min(920px, calc(100% - 48px)); padding: 40px; border: 1px solid rgba(255,255,255,.12); border-radius: 28px; background: rgba(255,255,255,.04); box-shadow: 0 24px 80px rgba(0,0,0,.28); }
      h1 { margin: 0 0 12px; font-family: Georgia, serif; font-size: clamp(36px, 7vw, 72px); }
      p { color: #c9c1b7; font-size: 18px; line-height: 1.7; }
      nav { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 28px; }
      a { color: #1f1f1d; background: #d98361; padding: 12px 18px; border-radius: 14px; text-decoration: none; font-weight: 700; }
      a.secondary { background: transparent; color: #f4efe7; border: 1px solid rgba(255,255,255,.18); }
    </style>
  </head>
  <body>
    <main>
      <h1>Seraph's Pictures</h1>
      <p>私有媒体工作区。根路径 Legacy 页面是当前主流程，Vue App 保留在 /app 用于新版体验和后续迁移。</p>
      <nav>
        <a href="/">打开上传首页</a>
        <a href="/admin.html" class="secondary">管理后台</a>
        <a href="/webdav.html" class="secondary">WebDAV</a>
        <a href="/app/status" class="secondary">状态页</a>
      </nav>

</html>
