server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  client_max_body_size 120m;

  # Emit relative redirects (e.g. Location: /app/storage/) so the published host
  # port is preserved. Otherwise nginx redirects /app/storage to the internal
  # port 80 (http://localhost/app/storage/) and the browser lands on the wrong
  # port when the container is published as 8080:80.
  absolute_redirect off;

  location /api/ {
    proxy_pass http://api:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location = /upload {
    # Keep Docker/self-hosted navigation aligned with Cloudflare Pages:
    # GET /upload renders the Chinese single-page UI, while POST /upload
    # remains the upload API endpoint.
    if ($request_method = GET) {
      rewrite ^ /index.html last;
    }
    if ($request_method = HEAD) {
      rewrite ^ /index.html last;
    }

    proxy_pass http://api:8787/upload;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /file/ {
    proxy_pass http://api:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /share/ {
    proxy_pass http://api:8787;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  # Vue SPA under /app/: deep links fall back to the app shell, not the legacy
  # root page (the Cloudflare _redirects/_middleware rules do not apply here).
  location /app/ {
    try_files $uri $uri/ /app/index.html;
  }

  location / {
    # Clean URLs like /gallery or /admin resolve to /gallery.html etc., matching
    # how Cloudflare Pages serves the legacy pages. Without $uri.html these fall
    # through to /index.html and every nav link lands on the home page.
    try_files $uri $uri.html $uri/ /index.html;
  }
}
